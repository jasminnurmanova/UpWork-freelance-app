{% extends "base.html" %}

{% block content %}

<div class="create-wrapper">

  <div class="page-top">
    <div class="breadcrumb">
      <a href="{% url 'home' %}">Dashboard</a>
      <span>›</span>
      <a href="{% url 'my_projects' %}">My Projects</a>
      <span>›</span>
      Edit Project
    </div>

    <h1>Edit Project</h1>
    <p>Update your project details.</p>
  </div>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-layout">

      <!-- LEFT -->
      <div>

        <!-- Project title -->
        <div class="form-card">

          <div class="form-group">
            <label>Project Title</label>

            <input type="text"
                   name="title"
                   value="{{ form.title.value|default:project.title }}"
                   maxlength="255">
          </div>

          <div class="form-group">
            <label>Description</label>

            <textarea name="description" rows="6">
{{ form.description.value|default:project.description }}
            </textarea>
          </div>

        </div>

        <!-- Budget + deadline -->

        <div class="form-card">

          <div class="form-group">
            <label>Budget</label>

            <input type="number"
                   name="budget"
                   step="0.01"
                   value="{{ form.budget.value|default:project.budget }}">
          </div>

          <div class="form-group">
            <label>Deadline</label>

            <input type="date"
                   name="deadline"
                   value="{{ form.deadline.value|date:'Y-m-d'|default:project.deadline }}">
          </div>

        </div>

        <!-- Image -->

        <div class="form-card">

          <label>Project Image</label>

          {% if project.image %}
          <div style="margin-bottom:10px;">
            <img src="{{ project.image.url }}"
                 style="width:200px;border-radius:10px;">
          </div>
          {% endif %}

          <input type="file" name="image">

          <p style="font-size:12px;color:#888;margin-top:6px;">
            Upload new image to replace current one.
          </p>

        </div>

      </div>

      <!-- RIGHT ACTIONS -->

      <div>

        <div class="submit-card">

          <h3>Update Project</h3>

          <button type="submit"
                  class="btn btn-primary"
                  style="width:100%;padding:12px;">
            💾 Save Changes
          </button>

          <a href="{% url 'project_detail' project.id %}"
             class="btn btn-outline"
             style="width:100%;margin-top:10px;">
             Cancel
          </a>

        </div>

      </div>

    </div>

  </form>

</div>

{% endblock %}
